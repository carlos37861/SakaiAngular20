<form [formGroup]="state.detalleForm" class="grid">

  <div class="col-12 md:col-3">
    <label class="block mb-1">Código</label>
    <input pInputText [(ngModel)]="codigoTmp"
           [ngModelOptions]="{ standalone: true }"
           class="w-full" />
  </div>

  <div class="col-12 md:col-5">
    <label class="block mb-1">Descripción</label>
    <input pInputText [(ngModel)]="descripcionTmp"
           [ngModelOptions]="{ standalone: true }"
           class="w-full" />
  </div>

  <div class="col-12 md:col-2">
    <label class="block mb-1">U.M.</label>
    <input pInputText [(ngModel)]="umTmp"
           [ngModelOptions]="{ standalone: true }"
           class="w-full" />
  </div>

  <div class="col-12 md:col-2">
    <label class="block mb-1">Cantidad</label>
    <input pInputText type="number" [(ngModel)]="cantidadTmp"
           [ngModelOptions]="{ standalone: true }"
           class="w-full" />
  </div>

  <div class="col-12 flex justify-content-end">
    <button pButton type="button" label="Agregar" (click)="agregar()"></button>
  </div>

</form>
